# =============================================================================
# NominalDrift  —  Runtime Configuration Template
#
# USAGE
# -----
#   cp config.example.yaml config.yaml
#   Edit config.yaml with your local settings.
#   config.yaml is gitignored and never committed.
#
# All paths may be absolute or relative to the project root.
# =============================================================================

# ---------------------------------------------------------------------------
# LLM backend (Ollama — fully local)
# ---------------------------------------------------------------------------
llm:
  provider: "ollama"                    # only supported provider in Sprint 1
  base_url: "http://localhost:11434"    # Ollama default; change if using a
                                        # non-default port or remote machine
  model: "qwen2.5:7b-instruct"         # recommended Sprint 1 model (~4.5 GB)
  # fallback_model: "mistral:7b-instruct"
  temperature: 0.3          # low temperature for scientific precision
  max_tokens: 1024          # maximum tokens in a single narration response
  timeout_s: 60             # seconds before Ollama request times out
  system_prompt_override: null  # null = use the built-in metallurgy prompt

# ---------------------------------------------------------------------------
# Local data layer (private — gitignored)
# ---------------------------------------------------------------------------
data:
  base_path: "./data"                   # root for all private user data
  experiments_db: "experiments.db"     # SQLite file within base_path
  attachments_dir: "attachments"       # SEM images, EBSD maps, EPR curves
  vector_store_dir: "vector_store"     # ChromaDB persistence dir (Phase 1b)

# ---------------------------------------------------------------------------
# Output artefacts (private — gitignored)
# ---------------------------------------------------------------------------
outputs:
  base_path: "./outputs"               # root for generated plots/animations
  # Subdirectory per experiment: outputs/{experiment_id}/
  plot_dpi: 150                        # screen quality; 300 for report-quality
  animation_fps: 30                    # frames per second for MP4 output
  animation_max_frames: 300            # subsample if simulation has more frames
  prefer_mp4: true                     # false = always use GIF (no ffmpeg req'd)

# ---------------------------------------------------------------------------
# Scientific engine defaults
# ---------------------------------------------------------------------------
science:
  # Diffusion engine (Track 1 — metallurgy)
  diffusion:
    default_element: "Cr"              # element to simulate if not specified
    n_spatial: 200                     # number of spatial grid nodes
    x_max_m: 5.0e-6                   # domain size in metres (5 μm default)
    C_sink_wt_pct: 12.0               # GB Dirichlet BC (fast-precip approx.)
                                       # ~equilibrium Cr adj. to M23C6 at
                                       # 600-700°C in austenitic SS
    C_sink_threshold_warning: 0.80    # warn if depletion front exceeds
                                       # this fraction of x_max

  # Arrhenius constants override (null = use shipped defaults in science/constants/)
  arrhenius_override_path: null

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"         # DEBUG / INFO / WARNING / ERROR
  log_to_file: false
  log_file: "./outputs/nominal_drift.log"
